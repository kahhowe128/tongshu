name: ci
on:
  push: { branches: [main] }
  pull_request: {}
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run docs
      - name: gates (engine · color AA ×4 · docs↔engine · SSR · hours · assets · entitlement)
        run: node test/engine.test.js && node test/color.test.js && node test/docs.test.js && node test/ssr.test.js && node test/hours.test.js && node test/assets.test.js && node test/entitlement.test.js
      - run: npx playwright install --with-deps chromium
      - name: print user guide PDF from the same HTML source
        run: npm run pdf
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with: { path: dist }
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
